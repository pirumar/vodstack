# vodstack — Dokploy deployment compose.
#
# Differences from docker-compose.yml:
#   * NO build: sections — images are pulled from GHCR (built by GitHub Actions),
#     so the Dokploy host never compiles Go / runs npm / installs whisper.
#   * Cloudflare Tunnel (cloudflared) is ALWAYS on (no profile) — ingress comes
#     in through Cloudflare, so NO host ports are published for the app services
#     and the origin IP stays hidden.
#   * Ops services (minio/grafana/prometheus/origin) bind to 127.0.0.1 only.
#
# Set these in the Dokploy "Environment" UI for this Compose service:
#   IMAGE_PREFIX=ghcr.io/pirumar/vodstack
#   IMAGE_TAG=latest
#   CLOUDFLARE_TUNNEL_TOKEN=eyJ...          (from the Cloudflare Zero Trust tunnel)
#   PUBLIC_BASE_URL=https://stream.example.com
#   EMBED_BASE_URL=https://api.example.com
#   KEY_BASE_URL=https://api.example.com
#   TOKEN_SECRET / ADMIN_PASSWORD / PG_PASSWORD / MINIO_PASSWORD / GRAFANA_PASSWORD
#   SEED_LIBRARY_API_KEY / HF_TOKEN ...     (see deploy/.env.prod.example)
name: vodstack

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: ${RESTART:-unless-stopped}
    environment:
      POSTGRES_USER: ${PG_USER:-vodstack}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-vodstack}
      POSTGRES_DB: ${PG_DB:-vodstack}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-vodstack} -d ${PG_DB:-vodstack}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: ${RESTART:-unless-stopped}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    restart: ${RESTART:-unless-stopped}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-39001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-vodstack-videos};
      mc anonymous set download local/${MINIO_BUCKET:-vodstack-videos}/hls;
      mc anonymous set download local/${MINIO_BUCKET:-vodstack-videos}/raw;
      echo 'bucket ready';
      "

  api:
    image: ${IMAGE_PREFIX:-ghcr.io/pirumar/vodstack}/api:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: ${RESTART:-unless-stopped}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://${PG_USER:-vodstack}:${PG_PASSWORD:-vodstack}@postgres:5432/${PG_DB:-vodstack}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-vodstack-videos}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set to https://stream.<domain>}
      TOKEN_SECRET: ${TOKEN_SECRET:?set a strong secret}
      UPLOAD_URL_TTL: ${UPLOAD_URL_TTL:-3600}
      SEED_LIBRARY_ID: ${SEED_LIBRARY_ID:-default}
      SEED_LIBRARY_API_KEY: ${SEED_LIBRARY_API_KEY:-dev-library-key}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set an admin password}
      ADMIN_LIBRARY_ID: ${ADMIN_LIBRARY_ID:-default}
      TUS_DIR: "/tus"
      EMBED_BASE_URL: ${EMBED_BASE_URL:?set to https://api.<domain>}
      WHISPER_URL: "http://whisper:8000"
    tmpfs:
      - /tus:mode=1777

  worker:
    image: ${IMAGE_PREFIX:-ghcr.io/pirumar/vodstack}/worker:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: ${RESTART:-unless-stopped}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://${PG_USER:-vodstack}:${PG_PASSWORD:-vodstack}@postgres:5432/${PG_DB:-vodstack}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-vodstack-videos}
      SCRATCH_DIR: "/scratch"
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      FFMPEG_BIN: "ffmpeg"
      FFPROBE_BIN: "ffprobe"
      WHISPER_URL: "http://whisper:8000"
      KEY_BASE_URL: ${KEY_BASE_URL:?set to https://api.<domain>}
    tmpfs:
      - /scratch

  whisper:
    image: ${IMAGE_PREFIX:-ghcr.io/pirumar/vodstack}/whisper:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: ${RESTART:-unless-stopped}
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - whispercache:/root/.cache/huggingface
    # See docker-compose.yml: makes the "Up but not serving" hang visible. No
    # curl/wget in the slim image -> python. Generous start_period for first pull.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 300s

  origin:
    image: nginx:1.27-alpine
    restart: ${RESTART:-unless-stopped}
    depends_on:
      - minio
    volumes:
      - ./nginx/origin.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:${ORIGIN_PORT:-38081}:80"

  edge:
    image: ${IMAGE_PREFIX:-ghcr.io/pirumar/vodstack}/edge:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: ${RESTART:-unless-stopped}
    depends_on:
      - origin
    environment:
      TOKEN_SECRET: ${TOKEN_SECRET:?set a strong secret}
      TOKEN_SECRET_PREVIOUS: ${TOKEN_SECRET_PREVIOUS:-}
    tmpfs:
      - /var/cache/nginx

  web:
    image: ${IMAGE_PREFIX:-ghcr.io/pirumar/vodstack}/web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: ${RESTART:-unless-stopped}
    depends_on:
      - api

  # Cloudflare Tunnel — always on in the Dokploy deployment. Outbound-only;
  # routes the public hostnames (configured in the Cloudflare dashboard) to
  # edge:80 / api:8080 / web:80 over this compose network. No host ports needed.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: ${RESTART:-unless-stopped}
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?set the Cloudflare tunnel token}
    depends_on:
      - edge
      - api
      - web

  prometheus:
    image: prom/prometheus:latest
    restart: ${RESTART:-unless-stopped}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-39092}:9090"

  grafana:
    image: grafana/grafana:latest
    restart: ${RESTART:-unless-stopped}
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-vodstack-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-33001}:3000"

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:
  whispercache:
