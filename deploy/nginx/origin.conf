# Phase 1 origin: serves HLS by reverse-proxying MinIO. It is the only thing
# that talks to MinIO (origin-shield). In Phase 2 an edge tier with njs HMAC
# validation + NVMe proxy_cache sits in front of this.
#
# The token query arg is accepted but NOT yet validated here (Phase 1). /play
# already mints signed URLs, so the frontend wiring is forward-compatible.

# Segments are immutable -> cache forever; playlists are short-lived so a
# re-transcode propagates quickly. Keyed off the file extension.
map $uri $hls_cache_control {
    default                 "public, max-age=10";
    "~*\.(m4s|mp4)$"        "public, max-age=31536000, immutable";
}

upstream minio_backend {
    server minio:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    location /hls/ {
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Map /hls/<id>/file -> bucket "vodstack-videos" object "hls/<id>/file".
        proxy_pass http://minio_backend/vodstack-videos/hls/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # hls.js fetches manifests/segments cross-origin; allow it.
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Accept" always;
        add_header Cache-Control $hls_cache_control always;
    }

    # Original uploaded files for Early-Play (progressive playback before HLS is
    # ready) and downloads. Maps /raw/<id>/source -> bucket object raw/<id>/source.
    # ?dl=1 turns the response into a file download (Content-Disposition).
    location /raw/ {
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://minio_backend/vodstack-videos/raw/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Accept" always;
    }

    location = /healthz {
        return 200 "ok";
        default_type text/plain;
    }
}
