# Serves the React panel and proxies /admin to the Go API so the session cookie
# stays same-origin. Uploads stream through (no buffering, no size cap).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /admin/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;

        # Large, streamed uploads (admin source PUT).
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Resumable uploads (tus) — same-origin so the panel session cookie applies.
    location /tus/ {
        proxy_pass http://api:8080;
        # $http_host (not $host) keeps the port: tusd builds the upload Location
        # header from this, so dropping :8090 would point PATCHes at port 80.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        # Behind Cloudflare Tunnel the public scheme is https but this hop is http.
        # Forward the original scheme/host so tusd (RespectForwardedHeaders) builds
        # an https:// Location instead of http:// (the panel blocks http as mixed
        # content). In dev there is no Cloudflare, so X-Forwarded-Proto is empty and
        # tusd falls back to the request scheme (http) — correct for localhost.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_http_version 1.1;

        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
