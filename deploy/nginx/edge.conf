# Phase 2 edge: the high-traffic, viewer-facing tier.
#   1. njs validates the HMAC signed-URL token (403 on invalid/expired).
#   2. valid requests are served from a local (NVMe in prod) proxy_cache.
#   3. misses are fetched once from the origin (which shields MinIO).
#
# The token is validated BEFORE the cache lookup, and the cache key is the URI
# WITHOUT query args, so a per-viewer token never fragments the shared cache.

js_import hmac from /etc/nginx/njs/hmac_auth.js;
js_set $token_valid hmac.validate;

# Segments are immutable -> long client cache; playlists short for freshness.
map $uri $hls_cache_control {
    default          "public, max-age=10";
    "~*\.(m4s|mp4)$" "public, max-age=31536000, immutable";
}

# ?dl=1 on a /raw/ request turns the original into a file download.
map $arg_dl $raw_disposition {
    default "";
    "1"     "attachment";
}

proxy_cache_path /var/cache/nginx/hls levels=1:2 keys_zone=hls_cache:50m
                 max_size=5g inactive=7d use_temp_path=off;

upstream origin_backend {
    server origin:80;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    location = /healthz {
        return 200 "ok";
        default_type text/plain;
    }

    location /hls/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Origin, Accept" always;
            return 204;
        }

        # HMAC signed-URL enforcement.
        if ($token_valid != "1") {
            return 403;
        }

        proxy_pass http://origin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        # Cache: key strips the token so all viewers share one entry.
        proxy_cache hls_cache;
        proxy_cache_key $uri;
        proxy_cache_valid 200 7d;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_background_update on;

        # MinIO and the origin each emit their own CORS + Cache-Control headers.
        # Strip every upstream copy so the client gets EXACTLY ONE of each —
        # duplicate Access-Control-Allow-Origin is a hard CORS failure in browsers.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Cache-Control;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control $hls_cache_control always;
    }

    # Original files: Early-Play + downloads. Token-enforced like /hls/, but NOT
    # cached (originals are large and rarely re-fetched) and Range is proxied
    # straight through for scrubbing.
    location /raw/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Origin, Accept" always;
            return 204;
        }

        if ($token_valid != "1") {
            return 403;
        }

        proxy_pass http://origin_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Cache-Control;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "private, max-age=0" always;
        add_header Content-Disposition $raw_disposition always;
    }
}
